name: Build & Push Batch Scraper Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/build-batch-scraper-image.yml'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even without changes'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sipap-dev-batch-scraper
  IMAGE_TAG: latest

jobs:
  build-and-push:
    name: Build Batch Scraper Image + Push to ECR
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SIPAP_DEV_AWS_ROLE_ARN }}
          role-session-name: sipap-batch-scraper-build
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: |
          aws sts get-caller-identity
          echo "AWS Region: $AWS_REGION"
          echo "ECR Repository: $ECR_REPOSITORY"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Batch Scraper Image
        run: |
          echo "=============================================="
          echo "Component:   Batch Scraper (Daily Harvest)"
          echo "Environment: Development"
          echo "Image Tag:   ${IMAGE_TAG}"
          echo "Platform:    linux/amd64 (ECS Fargate compatible)"
          echo "=============================================="

          # Get ECR repository URL
          ECR_REGISTRY=$(aws ecr describe-repositories \
            --repository-names ${ECR_REPOSITORY} \
            --query 'repositories[0].repositoryUri' \
            --output text | cut -d'/' -f1)

          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "Building image: ${IMAGE_URI}"

          # Build for amd64 platform (ECS Fargate architecture)
          docker buildx build \
            --platform linux/amd64 \
            --tag ${IMAGE_URI} \
            --push \
            .

          echo "✅ Successfully built and pushed: ${IMAGE_URI}"

      - name: Get Image Digest
        id: image-digest
        run: |
          DIGEST=$(aws ecr describe-images \
            --repository-name ${ECR_REPOSITORY} \
            --image-ids imageTag=${IMAGE_TAG} \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "ERROR: Could not resolve digest for ${ECR_REPOSITORY}:${IMAGE_TAG}"
            exit 1
          fi

          echo "Resolved digest: $DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Force Update ECS Task Definition
        run: |
          set -e  # Exit on any error

          echo "Forcing new ECS task definition revision..."

          # Get current task definition (suppress all None output)
          TASK_DEF_ARN=$(aws ecs list-task-definitions \
            --family-prefix sipap-dev-daily-harvest \
            --sort DESC \
            --max-items 1 \
            --query 'taskDefinitionArns[0]' \
            --output text 2>&1 | grep -v "^None$" | head -1)

          if [ -z "$TASK_DEF_ARN" ] || [ "$TASK_DEF_ARN" = "None" ]; then
            echo "⚠️  No existing task definition found. Skipping update."
            echo "ℹ️  Run 'terraform apply' in sipap-terraform/events to create the task definition."
            exit 0
          fi

          echo "Current task definition: $TASK_DEF_ARN"

          # Get task definition JSON (write to temp file to avoid None output)
          TEMP_FILE=$(mktemp)
          aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_ARN}" \
            --query 'taskDefinition' \
            --output json > "$TEMP_FILE" 2>&1

          # Validate JSON was retrieved
          if [ ! -s "$TEMP_FILE" ]; then
            echo "❌ ERROR: Failed to retrieve task definition details"
            rm -f "$TEMP_FILE"
            exit 1
          fi

          # Remove task definition metadata fields
          jq -c 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' "$TEMP_FILE" > "${TEMP_FILE}.new"

          # Validate processed JSON
          if [ ! -s "${TEMP_FILE}.new" ]; then
            echo "❌ ERROR: Failed to process task definition JSON"
            rm -f "$TEMP_FILE" "${TEMP_FILE}.new"
            exit 1
          fi

          # Register new revision
          echo "Registering new task definition revision..."
          RESULT=$(aws ecs register-task-definition \
            --cli-input-json "file://${TEMP_FILE}.new" \
            --query 'taskDefinition.{family:family,revision:revision}' \
            --output text 2>&1 | grep -v "^None$")

          if [ -z "$RESULT" ]; then
            echo "❌ ERROR: Failed to register new task definition"
            rm -f "$TEMP_FILE" "${TEMP_FILE}.new"
            exit 1
          fi

          # Clean up temp files
          rm -f "$TEMP_FILE" "${TEMP_FILE}.new"

          echo "✅ Successfully registered new task definition revision"
          echo "   $RESULT"
          echo ""
          echo "ℹ️  Next scheduled run will use the new image automatically"
          echo "ℹ️  To trigger immediate execution:"
          echo "    aws ecs run-task --cluster sipap-dev-cluster --task-definition sipap-dev-daily-harvest --launch-type FARGATE ..."
